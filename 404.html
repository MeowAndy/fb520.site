<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404｜菲比Bot</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet" />
  <style>
    body{min-height:100vh;background:radial-gradient(circle at 20% 10%,rgba(101,255,240,.18),transparent 30%),radial-gradient(circle at 75% 20%,rgba(184,156,255,.2),transparent 35%),linear-gradient(135deg,#070914,#111834 55%,#090d1a);color:#e2e8f0;font-family:system-ui,-apple-system,sans-serif}.glass{background:linear-gradient(135deg,rgba(255,255,255,.1),rgba(255,255,255,.04));border:1px solid rgba(255,255,255,.14);box-shadow:0 24px 70px rgba(0,0,0,.36);backdrop-filter:blur(18px)}
  </style>
</head>
<body class="flex items-center justify-center p-6">
  <main class="glass rounded-[2rem] p-8 md:p-12 text-center max-w-xl">
    <div class="w-24 h-24 mx-auto rounded-full border border-cyan-300/40 flex items-center justify-center mb-6 shadow-[0_0_40px_rgba(101,255,240,.25)]">
      <i class="fa fa-star text-5xl text-yellow-200"></i>
    </div>
    <h1 class="text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-cyan-200 via-purple-200 to-yellow-200">404</h1>
    <p class="mt-4 text-xl font-bold">信标迷路了</p>
    <p class="mt-3 text-slate-300">你访问的页面暂时没有回应，也许菲比正在整理鸣潮数据。</p>
    <a href="/" class="inline-flex items-center gap-2 mt-8 px-6 py-3 rounded-2xl bg-gradient-to-r from-cyan-200 to-purple-200 text-slate-950 font-bold">
      <i class="fa fa-home"></i> 回到首页
    </a>
  </main>
</body>
</html>
